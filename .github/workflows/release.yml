name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build and verify distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Build distributions
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Verify wheel installation
        run: |
          python -m venv /tmp/taiyin-wheel-check
          /tmp/taiyin-wheel-check/bin/python -m pip install --no-deps dist/*.whl
          /tmp/taiyin-wheel-check/bin/taiyin-semi-analytic 2451545.0 301 > /dev/null
      - uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish distributions
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/taiyin-ephemeris-semi-analytic
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
